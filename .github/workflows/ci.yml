name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck

      - name: Check shell scripts
        run: shellcheck assets/startup.sh

      - name: Validate Compose configuration
        run: |
          docker compose --env-file .env.example config --format json > /tmp/compose-config.json
          jq -e '
            .services.chrony.build.dockerfile == "Dockerfile.gpsntp"
            and .services.chrony.build.args.CHRONY_UID == "108"
            and .services.chrony.build.args.CHRONY_GID == "20"
            and .services.chrony.read_only == true
            and .services.chrony.network_mode == "host"
            and any(.services.chrony.cap_add[]; . == "SYS_TIME")
            and .services.chrony.environment.ENABLE_SYSCLK == "true"
            and .services.chrony.environment.ENABLE_GPSD_SOCK == "true"
            and .services.chrony.environment.ENABLE_KERNEL_PPS == "false"
            and .services.chrony.environment.GPS_PREFER == "true"
            and .services.chrony.environment.NTP_ALLOW == "all"
            and .services.chrony.environment.NTP_SOURCE_TYPE == "pool"
            and any(
              .services.chrony.volumes[];
              .source == "chrony-data"
              and .target == "/var/lib/chrony"
            )
          ' /tmp/compose-config.json

      - name: Build image
        run: docker build --tag gpsntp:test --file Dockerfile.gpsntp .

      - name: Validate Chrony account identity
        run: |
          docker run --rm --entrypoint sh gpsntp:test -c \
            'test "$(id -u chrony)" = 108 && test "$(id -g chrony)" = 20'

      - name: Validate startup script in image
        run: docker run --rm --entrypoint bash gpsntp:test -n /usr/local/bin/startup

      - name: Validate image healthcheck
        run: |
          docker image inspect gpsntp:test |
            jq -e '.[0].Config.Healthcheck.Test == ["CMD", "chronyc", "waitsync", "1"]'

  docker:
    runs-on: ${{ matrix.runner }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
          flavor: suffix=-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.description=GPS, PPS, and PTP-backed Chrony NTP server.

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.gpsntp
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          outputs: ${{ github.event_name != 'pull_request' && 'type=registry,oci-mediatypes=false' || 'type=image,oci-mediatypes=false' }}
          annotations: |
            manifest:org.opencontainers.image.description=GPS, PPS, and PTP-backed Chrony NTP server.

  docker-merge:
    runs-on: ubuntu-24.04
    needs: docker
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create and push multi-arch manifest
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
        run: |
          set -euo pipefail
          jq -cr '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON" | while read -r tag; do
            repo="${tag%%:*}"
            name="${tag##*:}"
            docker buildx imagetools create \
              --annotation "index:org.opencontainers.image.description=GPS, PPS, and PTP-backed Chrony NTP server." \
              -t "$tag" \
              "${repo}:${name}-amd64" \
              "${repo}:${name}-arm64"
          done
